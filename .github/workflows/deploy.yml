name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::330552994757:role/github-actions-hefti-deployer
          aws-region: us-east-2
      # Same as npm run deploy (no --profile; OIDC). --legacy-peer-deps: visx vs React 19.
      - run: npm install --legacy-peer-deps && npm run build && aws s3 sync dist s3://hefti-app --delete
