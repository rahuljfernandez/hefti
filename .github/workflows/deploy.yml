name: Deploy to AWS Lambda

on:
  push:
    branches:
      - sam/github_actions
      # also need to change this value in IAM -> Roles -> 
      # github-actions-hefti-deployer -> Trust relationships
      # https://us-east-1.console.aws.amazon.com/iam/home?region=us-east-2#/roles/details/github-actions-hefti-deployer?section=trust_relationships

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - list files
        run: ls -la

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::330552994757:role/github-actions-hefti-deployer
          aws-region: us-east-2

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

